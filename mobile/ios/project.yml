name: Amigo
options:
  bundleIdPrefix: com.amigo
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  
targets:
  Amigo:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Amigo
        includes:
          - "**/*.swift"
          - "**/*.xcassets"
          - "**/*.yaml"
          - "**/*.json"
          - "Images/**"
          - "**/*.svg"
    info:
      path: Amigo/Info.plist
      properties:
        CFBundleDisplayName: Amigo
        CFBundleIdentifier: com.amigoai.ios
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.amigoai.ios
            CFBundleURLSchemes:
              - amigo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.amigoai.ios
        SWIFT_VERSION: "5.9"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        OTHER_LDFLAGS: "$(inherited) -framework shared"
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/iphonesimulator18.2"
    preBuildScripts:
      - script: |
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
        name: Build KMP Framework
        basedOnDependencyAnalysis: false
