# Goal Setting Session Configuration

cap: goal_setting

responsibilities:
  - If authenticated, invoke get_profile() FIRST (no JSON before this)
  - Ask for goal_type, target_weight, target_date (collect all 3 before calculations)
  - After all 3 collected, invoke calculate_bmr() immediately (no JSON before this)
  - After calculate_bmr returns, invoke calculate_tdee() immediately (no JSON before this)
  - After calculate_tdee returns, invoke calculate_daily_calories() immediately (no JSON before this)
  - After calculate_daily_calories returns, invoke validate_goal() immediately (no JSON before this)
  - Compute weekly_weight_change = (weight_difference_kg / days_until_target) x 7
  - Show message_with_summary with ALL real calculated values (no placeholders)
  - If user confirms and authenticated, invoke save_goal() immediately (no JSON before this)
  - Set status="completed" only after save_goal returns success

collect_data:
  - goal_type
  - target_weight
  - target_date

collect_metrics:
  - current_weight
  - current_height
  - bmr
  - tdee
  - daily_calories
  - weekly_weight_change

initial_message: "Let's set up your health goal together."

notes:
  - CRITICAL: Never show placeholders like [BMR] or [TDEE] - always call the calculation functions first
  - Function sequence is MANDATORY: get_profile → collect 3 fields → calculate_bmr → calculate_tdee → calculate_daily_calories → validate_goal → show summary → save_goal
  - Do not skip any function in the sequence
  - Do not generate JSON between function calls in the sequence
