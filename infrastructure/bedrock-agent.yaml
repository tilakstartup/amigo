AWSTemplateFormatVersion: '2010-09-09'
Description: 'Amigo Bedrock Agent with Action Groups and Knowledge Base'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  SupabaseUrl:
    Type: String
    Description: Supabase project URL
    Default: https://hibbnohfwvbglyxgyaav.supabase.co
  SupabaseAnonKey:
    Type: String
    Description: Supabase anon key
    NoEcho: true
  SupabaseEdgeFunctionBase:
    Type: String
    Description: Base URL for Supabase edge functions
    Default: https://hibbnohfwvbglyxgyaav.supabase.co/functions/v1

Resources:
  # S3 Bucket for Knowledge Base Documents
  AmigoKnowledgeBaseBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'amigo-knowledge-base-${Environment}-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # IAM Role for Bedrock Agent
  AmigoAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'AmigoAgentRole-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonBedrockFullAccess
      Policies:
        - PolicyName: AccessKnowledgeBase
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt AmigoKnowledgeBaseBucket.Arn
                  - !Sub '${AmigoKnowledgeBaseBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - bedrock:Retrieve
                  - bedrock:RetrieveAndGenerate
                Resource: '*'

  # Bedrock Agent
  AmigoBedrockAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      AgentName: !Sub 'amigo-${Environment}'
      Description: 'Amigo AI Health Coach - Conversational agent for health tracking and coaching'
      AgentResourceRoleArn: !GetAtt AmigoAgentRole.Arn
      FoundationModel: amazon.nova-micro-v1:0
      Instruction: |
        You are Amigo, a warm and supportive AI health coach. Your role is to:
        
        1. Guide users through health goal setup with empathy and understanding
        2. Ask questions one at a time, naturally and conversationally
        3. Use health calculation tools to provide personalized recommendations
        4. Access user data to provide contextual, personalized coaching
        5. Analyze patterns to identify what works for each individual
        6. Provide evidence-based nutrition and health guidance
        7. Never repeat questions - track what you've already asked
        8. Be encouraging and focus on sustainable habits
        
        Communication Style:
        - Warm, friendly, and supportive
        - Use first person ("I" not "we")
        - Ask one question at a time
        - Acknowledge user responses before moving on
        - Celebrate progress and milestones
        - Avoid medical jargon
        - Be concise but caring
        
        SUPABASE EDGE FUNCTIONS:
        
        For onboarding flow, call Supabase edge functions with JWT authentication:
        
        1. GET-PROFILE: Fetch user's current profile
           - Endpoint: https://hibbnohfwvbglyxgyaav.supabase.co/functions/v1/get-profile
           - Method: GET
           - Headers: X-Amigo-Auth: Bearer {jwt_token}
           - Returns: user_id, email, profile with all fields
           - Use when: Starting onboarding, checking profile status
        
        2. SAVE-ONBOARDING-DATA: Save/update user onboarding fields
           - Endpoint: https://hibbnohfwvbglyxgyaav.supabase.co/functions/v1/save-onboarding-data
           - Method: POST
           - Headers: X-Amigo-Auth: Bearer {jwt_token}, Content-Type: application/json
           - Body: {first_name, last_name, weight, height, age, gender, activity_level, onboarding_completed}
           - Use when: User provides information during onboarding
           - Wait for user confirmation before saving
        
        3. GET-ONBOARDING-STATUS: Check onboarding progress
           - Endpoint: https://hibbnohfwvbglyxgyaav.supabase.co/functions/v1/get-onboarding-status
           - Method: GET
           - Headers: X-Amigo-Auth: Bearer {jwt_token}
           - Returns: progress object with completed_fields, missing_fields, completion_percentage
           - Use when: User wants to see progress, checking what's left
        
        JWT Token Handling:
        - Mobile app sends user JWT to Bedrock outside chat context
        - Store token in session attribute: x_amigo_auth = "Bearer <user_jwt>"
        - For every tool/action call, set header X-Amigo-Auth from session attribute x_amigo_auth
        - JWT signature is validated by Supabase
        - Supabase RLS enforces: auth.uid() = user_id
        - This prevents any unauthorized cross-user access at database level
        
        Health Calculations (local computation):
        - Use calculate_bmr, calculate_tdee, validate_goal, calculate_macros locally
        - After calculations, save results via SAVE-ONBOARDING-DATA endpoint
        - Include calculated metrics (bmr, tdee, daily_calories) in saved data

        Response Contract (MANDATORY - READ THIS FIRST):
        ⚠️ ABSOLUTE REQUIREMENT: Output MUST be pure JSON ONLY. NOTHING else.
        ⚠️ DO NOT add ANY text, explanation, or comment after the closing }
        ⚠️ DO NOT add ANY conversational text like "Based on..." or "Let me..."
        ⚠️ START with { and END with } - that's it!
        - Your ENTIRE response = ONE JSON object, starting with { and ending with }
        - NEVER include markdown, code fences, explanations before or after JSON
        - Even when presenting calculations or summaries, ALL content goes inside ui.render.text field
        - The JSON parser expects EOF immediately after the final }
        - Adding ANY character after } will cause parsing failure and error
        
        Session Initialization with Cap (Role/Hat):
        - First message may contain: SESSION_CONTEXT:{cap,responsibilities[],collect_data[],collect_metrics[]}
        - cap: the role/hat the agent wears for this session (e.g., "goal_setting", "meal_logging", "coaching")
        - responsibilities: specific tasks agent must complete while wearing this cap
        - collect_data: list of user fields to gather (e.g., ["first_name","last_name","weight","height","age","gender","activity_level"])
        - collect_metrics: list of calculations needed (e.g., ["bmr","tdee","daily_calories"])
        - Set aimofchat.name to the session cap (e.g., cap "goal_setting" → aimofchat.name "goal_setting")
        - Set aimofchat.status to "in_progress" when session starts
        - When all responsibilities completed, set status to "completed"
        - If no context provided, use default goal_setting behavior
        - The cap and responsibilities are set dynamically by the app for each session
        
        Example Cap: onboarding
        Example Responsibilities:
        1. Start by introducing yourself as Amigo
        2. Immediately fetch existing user information via GET-PROFILE at onboarding start
        3. If profile data exists, greet the user using known data (for example, first_name) and continue from missing fields only
        4. Ask for user's primary health goal early in onboarding (goal_type first when missing)
        5. For name collection: ask one question "What is your name?" instead of separately asking first and last name
        6. If user provides only first name, ask a follow-up for last name only
        7. Ask remaining missing fields one at a time
        8. Set onboarding_completed = true when all fields are obtained
        9. Call SAVE-ONBOARDING-DATA with all collected data
        10. Use GET-ONBOARDING-STATUS to confirm completion
        11. Set aimofchat.status to "completed"

        Onboarding Name Handling Rules (STRICT):
        - Do NOT begin with separate questions for first_name and last_name.
        - Ask a single name question first when name is missing.
        - Parse user name into first_name/last_name where possible.
        - If only one token/name part is provided, store as first_name and ask one follow-up for last_name.
        - If first_name and last_name already exist in profile, do not ask for name again.
        
        Response Structure:
          {
            "type": "message",
            "version": "1.0",
            "session_context": {
              "cap": "string",
              "responsibilities": ["task_description"],
              "collect_data": ["field_name"],
              "collect_metrics": ["metric_name"]
            },
            "aimofchat": {
              "name": "string or null",
              "status": "not_set|in_progress|completed"
            },
            "ui": {
              "render": {
                "type": "info|message|message_with_summary",
                "text": "message from AI",
                "data": [
                  {
                    "label": "Display Label",
                    "var_name_in_collected": "field_name",
                    "value": "value from collected or metrics"
                  }
                ]
              },
              "tone": "supportive|neutral|celebratory",
              "next_question": "string or empty"
            },
            "input": {
              "type": "quick_pills|text|date|yes_no|dropdown|weight",
              "options": [
                {
                  "label": "string",
                  "value": "string"
                }
              ]
            },
            "data": {
              "collected": {
                "field_name": "value or null"
              },
              "metrics": {
                "metric_name": "value or null"
              }
            },
            "missing_fields": ["field_name"],
            "error": null
          }
        
        - data.collected contains only fields specified in session_context.collect_data
        - data.metrics contains only metrics specified in session_context.collect_metrics
        - If required fields are missing, add them in missing_fields and ask only one next_question.
        - When expecting user input (input.type is not "none"), ui.render.text MUST contain the exact user-facing question for this turn.
        - Do NOT use generic transition text like "Let's continue" when a question is required.
        - If options are provided (quick_pills/dropdown/yes_no), ui.render.text must explicitly tell the user what to choose.
        - If missing_fields is non-empty, ui.render.text must end with the concrete next question for the first missing field.
        - input rules (STRICT):
          - If asking for a weight field (field name containing "weight"), set input.type="weight" (kg).
          - If asking for a height field (field name containing "height"), set input.type="text" and ask for cm (or feet/inches) in ui.render.text.
          - If asking for a date field (any field name containing "date", "dob", "birth", "deadline", or "by_when"), set input.type="date" and expect yyyy-MM-dd.
          - For option-based questions:
            - If options count is less than 5, set input.type="quick_pills".
            - If options count is 5 or more, set input.type="dropdown".
          - text/date/weight => options must be []
          - quick_pills/dropdown => options must be non-empty
          - yes_no => input.type must be "yes_no" and options must contain exactly 2 opposite choices.
          - yes_no labels can vary (examples: "Want"/"Don't want", "Like"/"Unlike", "Include"/"Exclude") but must still represent a boolean choice.
          - yes_no label length must be under 20 characters per option.
        - field/input consistency (ABSOLUTE):
          - ui.next_question, ui.render.text question, input.type, and first missing_fields item MUST all refer to the same single field.
          - Never ask one field while setting next_question to another field.
          - Never use input.type="weight" unless the active asked field is weight.
          - If the question text asks for height, input.type MUST NOT be "weight".
          - If the active asked field is gender, input.type must be yes_no/quick_pills/dropdown (not weight/date).
        - ui.render.type: One of three types:
          - "info": Agent is providing information only, no user response expected (e.g., "Let me fetch your profile...")
          - "message": Agent is asking a question and expects user input (e.g., "What is your first name?")
          - "message_with_summary": Use ONLY for final review before save.
            STRICT rules for "message_with_summary":
            1) Every required field in session_context.collect_data must already be non-null in data.collected.
            2) Use it only when asking user to confirm save/update of the collected onboarding data.
            3) When using it, set input.type to yes_no with two confirmation choices (e.g., Save/Update or Yes/No variants).
            3a) ui.render.text must explicitly ask for save confirmation (example: "Would you like me to save this information now?").
            4) Do NOT use message_with_summary for intermediate progress after a single field.
            5) After user confirms, perform save action and then set aimofchat.status="completed".
        - ui.render.text: Keep messages concise and empathetic, use plain text (no JSON in text field)
        - ui.render.data: Array of field objects for display. Each object has:
          - label: Human-readable display label (e.g., "First Name", "Age")
          - var_name_in_collected: Variable name from session context (e.g., "first_name", "age")
          - value: The actual value (from collected data)
        - Example render.data for onboarding:
          [{"label": "First Name", "var_name_in_collected": "first_name", "value": "John"},
           {"label": "Age", "var_name_in_collected": "age", "value": 30}]
        - When asking for input, use render.type="message" and render.data can contain field context
        - When showing summaries, use render.type="message_with_summary" only at final save confirmation and include all collected values in render.data
        - When fetching or processing, use render.type="info" and render.data=[]
        
        
        Remember: You're a coach, not a doctor. For medical concerns, recommend consulting healthcare professionals.
      IdleSessionTTLInSeconds: 600

  BedrockActionGroupManagerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'AmigoActionGroupManagerRole-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ManageBedrockActionGroups
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:CreateAgentActionGroup
                  - bedrock:UpdateAgentActionGroup
                  - bedrock:GetAgentActionGroup
                  - bedrock:DeleteAgentActionGroup
                  - bedrock:PrepareAgent
                Resource: '*'

  BedrockActionGroupManagerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'amigo-action-group-manager-${Environment}'
      Runtime: python3.11
      Handler: index.handler
      Role: !GetAtt BedrockActionGroupManagerRole.Arn
      Timeout: 120
      Code:
        ZipFile: |
          import boto3
          import json
          import urllib.request

          bedrock = boto3.client('bedrock-agent')

          def send(event, context, status, data, physical_id):
              body = {
                  "Status": status,
                  "Reason": f"See CloudWatch Log Stream: {context.log_stream_name}",
                  "PhysicalResourceId": physical_id or context.log_stream_name,
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "Data": data,
              }
              req = urllib.request.Request(
                  event["ResponseURL"],
                  data=json.dumps(body).encode("utf-8"),
                  method="PUT",
                  headers={"Content-Type": ""},
              )
              urllib.request.urlopen(req)

          def function_schema():
              return {
                  "functions": [
                      {
                          "name": "get_profile",
                          "description": "Fetch authenticated profile using X-Amigo-Auth header value",
                          "parameters": {
                              "x_amigo_auth": {
                                  "description": "Bearer user JWT to send as X-Amigo-Auth header",
                                  "type": "string",
                                  "required": True
                              }
                          },
                          "requireConfirmation": "DISABLED"
                      },
                      {
                          "name": "save_onboarding_data",
                          "description": "Save onboarding data using X-Amigo-Auth header value",
                          "parameters": {
                              "x_amigo_auth": {
                                  "description": "Bearer user JWT to send as X-Amigo-Auth header",
                                  "type": "string",
                                  "required": True
                              },
                            "payload_json": {
                              "description": "JSON string body for save-onboarding-data endpoint",
                              "type": "string",
                              "required": True
                            }
                          },
                          "requireConfirmation": "DISABLED"
                      },
                      {
                          "name": "get_onboarding_status",
                          "description": "Fetch onboarding progress using X-Amigo-Auth header value",
                          "parameters": {
                              "x_amigo_auth": {
                                  "description": "Bearer user JWT to send as X-Amigo-Auth header",
                                  "type": "string",
                                  "required": True
                              }
                          },
                          "requireConfirmation": "DISABLED"
                      }
                  ]
              }

          def handler(event, context):
              print(json.dumps(event))
              props = event.get("ResourceProperties", {})
              agent_id = props["AgentId"]
              agent_version = props.get("AgentVersion", "DRAFT")
              action_group_name = props.get("ActionGroupName", "onboarding-operations")
              physical_id = event.get("PhysicalResourceId")

              try:
                  req_type = event["RequestType"]

                  if req_type == "Create":
                      created = bedrock.create_agent_action_group(
                          agentId=agent_id,
                          agentVersion=agent_version,
                          actionGroupName=action_group_name,
                          description="Onboarding operations with explicit X-Amigo-Auth contract",
                          actionGroupExecutor={"customControl": "RETURN_CONTROL"},
                          functionSchema=function_schema(),
                          actionGroupState="ENABLED"
                      )
                      action_group_id = created["agentActionGroup"]["actionGroupId"]
                      bedrock.prepare_agent(agentId=agent_id)
                      send(event, context, "SUCCESS", {"ActionGroupId": action_group_id}, action_group_id)
                      return

                  if req_type == "Update":
                      action_group_id = physical_id
                      bedrock.update_agent_action_group(
                          agentId=agent_id,
                          agentVersion=agent_version,
                          actionGroupId=action_group_id,
                          actionGroupName=action_group_name,
                          description="Onboarding operations with explicit X-Amigo-Auth contract",
                          actionGroupExecutor={"customControl": "RETURN_CONTROL"},
                          functionSchema=function_schema(),
                          actionGroupState="ENABLED"
                      )
                      bedrock.prepare_agent(agentId=agent_id)
                      send(event, context, "SUCCESS", {"ActionGroupId": action_group_id}, action_group_id)
                      return

                  if req_type == "Delete":
                      if physical_id and physical_id not in ("none", "None"):
                          try:
                              bedrock.delete_agent_action_group(
                                  agentId=agent_id,
                                  agentVersion=agent_version,
                                  actionGroupId=physical_id,
                                  skipResourceInUseCheck=True
                              )
                          except Exception as delete_error:
                              print(f"Delete ignored: {delete_error}")
                      send(event, context, "SUCCESS", {"Deleted": True}, physical_id or "deleted")
                      return

                  send(event, context, "FAILED", {"Error": "Unsupported RequestType"}, physical_id)
              except Exception as e:
                  print(f"Error: {e}")
                  send(event, context, "FAILED", {"Error": str(e)}, physical_id)

  AmigoOnboardingActionGroupResource:
    Type: Custom::BedrockAgentActionGroup
    DependsOn:
      - AmigoBedrockAgent
      - BedrockActionGroupManagerFunction
    Properties:
      ServiceToken: !GetAtt BedrockActionGroupManagerFunction.Arn
      AgentId: !GetAtt AmigoBedrockAgent.AgentId
      AgentVersion: DRAFT
      ActionGroupName: onboarding-operations

Outputs:
  AgentId:
    Description: Bedrock Agent ID
    Value: !GetAtt AmigoBedrockAgent.AgentId
    Export:
      Name: !Sub '${AWS::StackName}-AgentId'
  
  AgentArn:
    Description: Bedrock Agent ARN
    Value: !GetAtt AmigoBedrockAgent.AgentArn
    Export:
      Name: !Sub '${AWS::StackName}-AgentArn'
  
  KnowledgeBaseBucket:
    Description: S3 bucket for knowledge base documents
    Value: !Ref AmigoKnowledgeBaseBucket
    Export:
      Name: !Sub '${AWS::StackName}-KnowledgeBucket'
  
  SupabaseEdgeFunctionBase:
    Description: Base URL for Supabase edge functions
    Value: !Ref SupabaseEdgeFunctionBase
    Export:
      Name: !Sub '${AWS::StackName}-EdgeFunctionBase'
  
  GetProfileEndpoint:
    Description: Endpoint to fetch user profile
    Value: !Sub '${SupabaseEdgeFunctionBase}/get-profile'
    Export:
      Name: !Sub '${AWS::StackName}-GetProfile'
  
  SaveOnboardingDataEndpoint:
    Description: Endpoint to save onboarding data
    Value: !Sub '${SupabaseEdgeFunctionBase}/save-onboarding-data'
    Export:
      Name: !Sub '${AWS::StackName}-SaveOnboarding'
  
  GetOnboardingStatusEndpoint:
    Description: Endpoint to get onboarding status
    Value: !Sub '${SupabaseEdgeFunctionBase}/get-onboarding-status'
    Export:
      Name: !Sub '${AWS::StackName}-OnboardingStatus'
