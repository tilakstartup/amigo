AWSTemplateFormatVersion: '2010-09-09'
Description: 'Amigo - AWS Bedrock Infrastructure with Lambda Proxy for Claude AI Access'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name
  
  SupabaseUrl:
    Type: String
    Description: Supabase project URL for JWT verification (e.g., https://xxx.supabase.co)
  
  SupabaseAnonKey:
    Type: String
    Description: Supabase anonymous key for API calls
    NoEcho: true

Resources:
  # Lambda Execution Role
  BedrockLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: BedrockInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'bedrock:InvokeModel'
                  - 'bedrock:InvokeModelWithResponseStream'
                  - 'bedrock:Converse'
                  - 'bedrock:ConverseStream'
                Resource:
                  - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-*'
                  - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.nova-*'
                  - !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/*'

  # Lambda Function for Bedrock Proxy
  BedrockProxyFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'amigo-bedrock-proxy-${Environment}'
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt BedrockLambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_ANON_KEY: !Ref SupabaseAnonKey
          ENVIRONMENT: !Ref Environment
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          from datetime import datetime
          from urllib import request as urllib_request
          from urllib.error import HTTPError, URLError
          
          # Initialize Bedrock client (AWS_REGION is automatically available in Lambda)
          bedrock_runtime = boto3.client('bedrock-runtime')
          
          # Supabase JWT verification
          SUPABASE_URL = os.environ.get('SUPABASE_URL')
          
          def verify_supabase_token(token):
              """Verify Supabase JWT token by calling Supabase API"""
              try:
                  # Use Supabase's user endpoint to verify the token
                  # This endpoint validates the JWT and returns user info
                  url = f"{SUPABASE_URL}/auth/v1/user"
                  
                  req = urllib_request.Request(url)
                  req.add_header('Authorization', f'Bearer {token}')
                  req.add_header('apikey', os.environ.get('SUPABASE_ANON_KEY', ''))
                  
                  with urllib_request.urlopen(req, timeout=5) as response:
                      if response.status == 200:
                          user_data = json.loads(response.read().decode('utf-8'))
                          return {
                              'sub': user_data.get('id'),
                              'email': user_data.get('email'),
                              'role': user_data.get('role', 'authenticated')
                          }
                  return None
              except (HTTPError, URLError) as e:
                  print(f"Token verification failed: {e}")
                  return None
              except Exception as e:
                  print(f"Unexpected error during token verification: {e}")
                  return None
          
          def lambda_handler(event, context):
              """
              Lambda function to proxy requests to AWS Bedrock
              Handles authentication and supports both Claude (Messages API) and Nova (Converse API)
              """
              
              # Debug logging
              print(f"Event: {json.dumps(event)}")
              
              # CORS headers
              headers = {
                  'Content-Type': 'application/json',
                  'Access-Control-Allow-Origin': '*',
                  'Access-Control-Allow-Headers': 'Content-Type,Authorization',
                  'Access-Control-Allow-Methods': 'POST,OPTIONS'
              }
              
              # Handle OPTIONS request for CORS
              if event.get('httpMethod') == 'OPTIONS':
                  return {
                      'statusCode': 200,
                      'headers': headers,
                      'body': ''
                  }
              
              try:
                  # Extract and verify authorization token
                  auth_header = event.get('headers', {}).get('Authorization', '')
                  if not auth_header.startswith('Bearer '):
                      return {
                          'statusCode': 401,
                          'headers': headers,
                          'body': json.dumps({'error': 'Missing or invalid authorization header'})
                      }
                  
                  token = auth_header.replace('Bearer ', '')
                  user_payload = verify_supabase_token(token)
                  
                  if not user_payload:
                      return {
                          'statusCode': 401,
                          'headers': headers,
                          'body': json.dumps({'error': 'Invalid or expired token'})
                      }
                  
                  user_id = user_payload.get('sub')
                  
                  # Parse request body
                  body = json.loads(event.get('body', '{}'))
                  
                  # Extract parameters
                  prompt = body.get('prompt')
                  model_id = body.get('modelId', 'anthropic.claude-3-haiku-20240307-v1:0')
                  max_tokens = body.get('maxTokens', 2048)
                  temperature = body.get('temperature', 0.7)
                  system_prompt = body.get('systemPrompt')
                  
                  if not prompt:
                      return {
                          'statusCode': 400,
                          'headers': headers,
                          'body': json.dumps({'error': 'Missing required parameter: prompt'})
                      }
                  
                  # Determine API format based on model
                  is_anthropic = 'anthropic' in model_id.lower()
                  is_nova = 'nova' in model_id.lower() or 'amazon' in model_id.lower()
                  
                  if is_anthropic:
                      # Build Claude Messages API request
                      claude_request = {
                          'anthropic_version': 'bedrock-2023-05-31',
                          'max_tokens': max_tokens,
                          'temperature': temperature,
                          'messages': [
                              {
                                  'role': 'user',
                                  'content': [
                                      {
                                          'type': 'text',
                                          'text': prompt
                                      }
                                  ]
                              }
                          ]
                      }
                      
                      if system_prompt:
                          claude_request['system'] = system_prompt
                      
                      # Call Bedrock with Messages API
                      response = bedrock_runtime.invoke_model(
                          modelId=model_id,
                          body=json.dumps(claude_request)
                      )
                      
                      # Parse Claude response
                      response_body = json.loads(response['body'].read())
                      
                      # Extract completion text
                      completion = ''
                      if response_body.get('content'):
                          for content_block in response_body['content']:
                              if content_block.get('type') == 'text':
                                  completion += content_block.get('text', '')
                      
                      # Build response
                      result = {
                          'completion': completion,
                          'stopReason': response_body.get('stop_reason', 'end_turn'),
                          'usage': {
                              'inputTokens': response_body.get('usage', {}).get('input_tokens', 0),
                              'outputTokens': response_body.get('usage', {}).get('output_tokens', 0)
                          },
                          'userId': user_id,
                          'timestamp': datetime.utcnow().isoformat()
                      }
                  
                  elif is_nova:
                      # Build Converse API request for Nova models
                      converse_request = {
                          'modelId': model_id,
                          'messages': [
                              {
                                  'role': 'user',
                                  'content': [{'text': prompt}]
                              }
                          ],
                          'inferenceConfig': {
                              'maxTokens': max_tokens,
                              'temperature': temperature
                          }
                      }
                      
                      if system_prompt:
                          converse_request['system'] = [{'text': system_prompt}]
                      
                      # Call Bedrock with Converse API
                      response = bedrock_runtime.converse(**converse_request)
                      
                      # Parse Converse API response
                      completion = ''
                      if response.get('output', {}).get('message', {}).get('content'):
                          for content_block in response['output']['message']['content']:
                              if content_block.get('text'):
                                  completion += content_block['text']
                      
                      # Build response
                      result = {
                          'completion': completion,
                          'stopReason': response.get('stopReason', 'end_turn'),
                          'usage': {
                              'inputTokens': response.get('usage', {}).get('inputTokens', 0),
                              'outputTokens': response.get('usage', {}).get('outputTokens', 0)
                          },
                          'userId': user_id,
                          'timestamp': datetime.utcnow().isoformat()
                      }
                  
                  else:
                      # Unsupported model type
                      return {
                          'statusCode': 400,
                          'headers': headers,
                          'body': json.dumps({'error': f'Unsupported model type: {model_id}'})
                      }
                  
                  return {
                      'statusCode': 200,
                      'headers': headers,
                      'body': json.dumps(result)
                  }
                  
              except json.JSONDecodeError:
                  return {
                      'statusCode': 400,
                      'headers': headers,
                      'body': json.dumps({'error': 'Invalid JSON in request body'})
                  }
              except Exception as e:
                  print(f"Error: {str(e)}")
                  return {
                      'statusCode': 500,
                      'headers': headers,
                      'body': json.dumps({'error': f'Internal server error: {str(e)}'})
                  }

  # API Gateway REST API
  BedrockProxyApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub 'amigo-bedrock-api-${Environment}'
      Description: API Gateway for Bedrock Lambda proxy
      EndpointConfiguration:
        Types:
          - REGIONAL

  # API Gateway Resource
  BedrockProxyResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref BedrockProxyApi
      ParentId: !GetAtt BedrockProxyApi.RootResourceId
      PathPart: 'invoke'

  # API Gateway Method (POST)
  BedrockProxyMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref BedrockProxyApi
      ResourceId: !Ref BedrockProxyResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${BedrockProxyFunction.Arn}/invocations'

  # API Gateway Method (OPTIONS for CORS)
  BedrockProxyOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref BedrockProxyApi
      ResourceId: !Ref BedrockProxyResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            ResponseTemplates:
              application/json: ''
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # API Gateway Deployment
  BedrockProxyDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - BedrockProxyMethod
      - BedrockProxyOptionsMethod
    Properties:
      RestApiId: !Ref BedrockProxyApi
      StageName: !Ref Environment

  # Lambda Permission for API Gateway
  BedrockProxyLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref BedrockProxyFunction
      Action: 'lambda:InvokeFunction'
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${BedrockProxyApi}/*/*/*'

Outputs:
  BedrockLambdaRoleArn:
    Description: ARN of the Bedrock Lambda execution role
    Value: !GetAtt BedrockLambdaExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-BedrockLambdaRoleArn'

  BedrockProxyFunctionArn:
    Description: ARN of the Bedrock proxy Lambda function
    Value: !GetAtt BedrockProxyFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-BedrockProxyFunctionArn'

  BedrockApiEndpoint:
    Description: API Gateway endpoint URL for Bedrock proxy (use this in mobile app)
    Value: !Sub 'https://${BedrockProxyApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/invoke'
    Export:
      Name: !Sub '${AWS::StackName}-BedrockApiEndpoint'

  BedrockApiId:
    Description: API Gateway ID
    Value: !Ref BedrockProxyApi
    Export:
      Name: !Sub '${AWS::StackName}-BedrockApiId'

  Region:
    Description: AWS Region for Bedrock
    Value: !Ref AWS::Region
